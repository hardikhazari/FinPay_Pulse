<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Analytics - FinPay Pulse</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-brand">FinPay Pulse</div>
            
            <a href="dashboard.html" class="nav-link">Customer Data</a>
            <a href="analytics.html" class="nav-link">Analytics Overview</a>
            <a href="more_analytics.html" class="nav-link active">More Analytics</a>
            <a href="info.html" class="nav-link">RFM Guide</a>
            
            <div class="sidebar-spacer"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header animate-fade">
                <div class="user-profile">
                    <div class="user-email" id="userEmailDisplay"></div>
                    <button id="logoutBtn" class="btn btn-sm">Sign Out</button>
                </div>
            </header>

            <div class="page-header animate-fade">
                <h1>More Analytics</h1>
            </div>
            
            <div class="charts-grid animate-fade" style="animation-delay: 0.1s;">
                <!-- Chart 1: Failure Rate -->
                <div class="chart-card glass">
                    <h3>Failure Rate by Payment Method</h3>
                    <div class="chart-container">
                        <canvas id="failureRateChart"></canvas>
                    </div>
                </div>

                <!-- Chart 2: Avg Spend per Segment -->
                <div class="chart-card glass">
                    <h3>Average Spend by Segment</h3>
                    <div class="chart-container">
                        <canvas id="avgSpendChart"></canvas>
                    </div>
                </div>

                <!-- Chart 3: Top Revenue Geographies -->
                <div class="chart-card glass">
                    <h3>Top 5 Cities by Total Revenue</h3>
                    <div class="chart-container">
                        <canvas id="revenueGeoChart"></canvas>
                    </div>
                </div>

                <!-- Chart 4: Payment Method by Segment -->
                <div class="chart-card glass">
                    <h3>Preferred Method by Segment</h3>
                    <div class="chart-container">
                        <canvas id="methodSegmentChart"></canvas>
                    </div>
                </div>

                <!-- Chart 5: Transaction Type by Device -->
                <div class="chart-card glass">
                    <h3>Transaction Type by Device</h3>
                    <div class="chart-container">
                        <canvas id="typeDeviceChart"></canvas>
                    </div>
                </div>
                
                <!-- Updated Time Chart -->
                <div class="chart-card glass" style="grid-column: 1 / -1;">
                    <h3>Transactions Over Time (Cleaned)</h3>
                    <div class="chart-container" style="height: 300px;">
                        <canvas id="timeChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
