<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Table - FinPay Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-brand">FinPay Pulse</div>
            
            <a href="dashboard.html" class="nav-link active">Customer Data</a>
            <a href="analytics.html" class="nav-link">Analytics Overview</a>
            <a href="more_analytics.html" class="nav-link">More Analytics</a>
            <a href="info.html" class="nav-link">RFM Guide</a>
            
            <div class="sidebar-spacer"></div>
            

        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header animate-fade">
                <div class="user-profile">
                    <div class="user-email" id="userEmailDisplay"></div>
                    <button id="logoutBtn" class="btn btn-sm">Sign Out</button>
                </div>
            </header>

            <div class="page-header animate-fade">
                <h1>Customer Segments</h1>
            </div>

            <div class="header-actions animate-fade">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search customer ID, segment...">
                </div>
            </div>
            
            <div class="table-container glass animate-fade" style="animation-delay: 0.1s;">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <!-- Headers will be generated dynamically -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
                <div class="pagination">
                    <button id="prevBtn" class="btn btn-sm" disabled>Previous</button>
                    <span id="pageInfo" style="font-weight: 500; color: var(--text-secondary);">Page 1 of 1</span>
                    <button id="nextBtn" class="btn btn-sm">Next</button>
                </div>
            </div>

            <!-- Transaction Drill-Down Modal -->
            <div id="transactionModal" class="modal">
                <div class="modal-content glass">
                    <div class="modal-header">
                        <h2 id="modalCustomerTitle">Customer Transactions</h2>
                        <span class="close-btn" id="closeModal">&times;</span>
                    </div>
                    <div class="modal-body">
                        <div class="table-container">
                            <table id="txTable">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Type</th>
                                        <th>Amount</th>
                                        <th>Method</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="txTableBody">
                                    <!-- Transaction data injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
